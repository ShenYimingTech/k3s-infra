apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: {name: backup, namespace: argocd, finalizers: [resources-finalizer.argocd.argoproj.io]}
spec:
  project: default
  source: {repoURL: git@github.com:ShenYimingTech/k3s-infra.git, targetRevision: main, path: manifests/backup}
  destination: {server: https://kubernetes.default.svc, namespace: kube-system}
  syncPolicy: {automated: {prune: true, selfHeal: true}}
