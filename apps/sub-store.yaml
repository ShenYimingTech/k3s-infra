apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sub-store
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source: {repoURL: git@github.com:ShenYimingTech/k3s-infra.git, targetRevision: main, path: manifests/sub-store}
  destination: {server: https://kubernetes.default.svc, namespace: proxy}
  syncPolicy: {automated: {prune: true, selfHeal: true}}
