apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: sub-store-data, namespace: proxy}
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 1Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: sub-store, namespace: proxy}
spec:
  replicas: 1
  selector: {matchLabels: {app: sub-store}}
  template:
    metadata: {labels: {app: sub-store}}
    spec:
      nodeSelector: {kubernetes.io/hostname: leo-hk}
      containers:
      - name: sub-store
        image: xream/sub-store:latest
        env:
        - {name: SUB_STORE_BACKEND_API_HOST, value: "127.0.0.1"}
        - {name: SUB_STORE_DATA_BASE_PATH, value: "/data"}
        - name: SUB_STORE_FRONTEND_BACKEND_PATH
          valueFrom: {secretKeyRef: {name: sub-store-env, key: backend-path}}
        ports: [{containerPort: 3001}]
        volumeMounts: [{name: data, mountPath: /data}]
        resources: {requests: {cpu: 20m, memory: 64Mi}, limits: {memory: 256Mi}}
      volumes:
      - name: data
        persistentVolumeClaim: {claimName: sub-store-data}
---
apiVersion: v1
kind: Service
metadata: {name: sub-store, namespace: proxy}
spec:
  selector: {app: sub-store}
  ports: [{port: 3001, targetPort: 3001}]
