apiVersion: batch/v1
kind: CronJob
metadata: {name: pv-backup, namespace: kube-system}
spec:
  schedule: "37 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector: {kubernetes.io/hostname: leo-hk}
          containers:
          - name: backup
            image: minio/mc:latest
            env:
            - {name: MC_CONFIG_DIR, value: /tmp/.mc}
            - {name: HOME, value: /tmp}
            - {name: AK, valueFrom: {secretKeyRef: {name: r2-creds, key: access-key}}}
            - {name: SK, valueFrom: {secretKeyRef: {name: r2-creds, key: secret-key}}}
            command: ["/bin/sh","-c"]
            args:
            - |
              mc alias set r2 https://8400a727da59a6bd8e93d2d3f2700c19.r2.cloudflarestorage.com "$AK" "$SK" || exit 1
              echo "mirror PV storage -> R2..."
              mc mirror --overwrite --remove --quiet /storage r2/k3s-longhorn-backup/pv-backup/current/ || exit 1
              echo "DONE $(mc ls --recursive r2/k3s-longhorn-backup/pv-backup/current/ | wc -l) objects mirrored"
            volumeMounts:
            - {name: storage, mountPath: /storage, readOnly: true}
          volumes:
          - name: storage
            hostPath: {path: /var/lib/rancher/k3s/storage, type: Directory}
