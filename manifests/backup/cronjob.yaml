apiVersion: batch/v1
kind: CronJob
metadata: {name: pv-backup, namespace: kube-system}
spec:
  schedule: "37 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector: {kubernetes.io/hostname: leo-hk}
          containers:
          - name: backup
            image: minio/mc:latest
            env:
            - {name: MC_CONFIG_DIR, value: /tmp/.mc}
            - {name: HOME, value: /tmp}
            - {name: AK, valueFrom: {secretKeyRef: {name: r2-creds, key: access-key}}}
            - {name: SK, valueFrom: {secretKeyRef: {name: r2-creds, key: secret-key}}}
            command: ["/bin/sh","-c"]
            args:
            - |
              TS=$(date +%Y%m%d-%H%M)
              echo "[1] alias"; mc alias set r2 https://8400a727da59a6bd8e93d2d3f2700c19.r2.cloudflarestorage.com "$AK" "$SK" || exit 1
              echo "[2] tar"; tar czf /tmp/pv-$TS.tar.gz -C /storage . 2>/dev/null || true
              echo "[3] size $(du -h /tmp/pv-$TS.tar.gz | cut -f1)"
              echo "[4] upload"; mc cp /tmp/pv-$TS.tar.gz r2/k3s-longhorn-backup/pv-backup/pv-$TS.tar.gz || exit 1
              echo "[5] retention"; mc rm --recursive --force --older-than 14d r2/k3s-longhorn-backup/pv-backup/ 2>/dev/null || true
              echo "[DONE] pv-$TS.tar.gz"
            volumeMounts:
            - {name: storage, mountPath: /storage, readOnly: true}
          volumes:
          - name: storage
            hostPath: {path: /var/lib/rancher/k3s/storage, type: Directory}
