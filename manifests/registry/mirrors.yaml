# Docker 镜像加速：5 个 registry:2 pull-through 缓存（钉 bo），Traefik+证书暴露 *.mirror.k4s.live
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: cache-dockerhub, namespace: registry}
spec:
  accessModes: [ReadWriteOnce]
  resources: {requests: {storage: 15Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: mirror-dockerhub, namespace: registry, labels: {upstream: "docker.io"}}
spec:
  replicas: 1
  selector: {matchLabels: {app: mirror-dockerhub}}
  strategy: {type: Recreate}
  template:
    metadata: {labels: {app: mirror-dockerhub}}
    spec:
      nodeSelector: {kubernetes.io/hostname: leo-hk}
      containers:
      - name: registry
        image: registry:2
        env:
        - {name: REGISTRY_PROXY_REMOTEURL, value: "https://registry-1.docker.io"}
        - {name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY, value: /var/lib/registry}
        - {name: REGISTRY_HTTP_ADDR, value: ":5000"}
        ports: [{containerPort: 5000}]
        volumeMounts: [{name: cache, mountPath: /var/lib/registry}]
        resources: {requests: {cpu: 20m, memory: 64Mi}, limits: {memory: 512Mi}}
      volumes:
      - {name: cache, persistentVolumeClaim: {claimName: cache-dockerhub}}
---
apiVersion: v1
kind: Service
metadata: {name: mirror-dockerhub, namespace: registry}
spec:
  selector: {app: mirror-dockerhub}
  ports: [{port: 5000, targetPort: 5000}]
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: {name: mirror-dockerhub, namespace: registry}
spec:
  entryPoints: [websecure]
  routes:
  - match: Host(`dockerhub.mirror.k4s.live`)
    kind: Rule
    services: [{name: mirror-dockerhub, port: 5000}]
  tls: {secretName: mirror-wildcard-tls}
